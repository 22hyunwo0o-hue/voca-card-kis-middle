<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영단어 마스터 플래시카드</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-front: #ffffff;
            --card-back: #6c5ce7;
            --text-main: #2d3436;
            --accent: #00b894;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
        }
        .container { width: 90%; max-width: 450px; text-align: center; }
        .progress { margin-bottom: 15px; font-weight: 700; color: #636e72; font-size: 1.1rem; }

        .card-view {
            perspective: 1000px;
            width: 100%;
            height: 280px;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            padding: 30px;
            box-sizing: border-box;
        }
        .front { background: var(--card-front); border: 2px solid #eee; }
        .front .word { font-size: 2.4rem; font-weight: 800; color: var(--card-back); margin: 0; }
        .front .hint { font-size: 0.9rem; color: #b2bec3; margin-top: 15px; }

        .back {
            background: var(--card-back);
            color: white;
            transform: rotateY(180deg);
        }
        .back .meaning { font-size: 2rem; font-weight: 700; word-break: keep-all; }

        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            background: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        button:hover { background: #e2e2e2; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .btn-shuffle { background: var(--accent); color: white; }
        .btn-shuffle:hover { background: #00a383; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress" id="progress">0 / 0</div>
    
    <div class="card-view" onclick="flipCard()">
        <div class="card-inner" id="card">
            <div class="face front">
                <p class="word" id="word-eng">Loading...</p>
                <p class="hint">클릭해서 뜻 확인</p>
            </div>
            <div class="face back">
                <p class="meaning" id="word-kor">뜻</p>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prev()">이전</button>
        <button class="btn-shuffle" onclick="shuffle()">순서 섞기</button>
        <button onclick="next()">다음</button>
    </div>
</div>

    let wordList = engWords.map((eng, i) => ({ eng, kor: korMeanings[i] }));
    let currentIndex = 0;
    const card = document.getElementById('card');

    function update() {
        card.classList.remove('flipped');
        setTimeout(() => {
            document.getElementById('word-eng').innerText = wordList[currentIndex].eng;
            document.getElementById('word-kor').innerText = wordList[currentIndex].kor;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${wordList.length}`;
        }, 100);
    }

    function flipCard() { card.classList.toggle('flipped'); }
    function next() { if (currentIndex < wordList.length - 1) { currentIndex++; update(); } }
    function prev() { if (currentIndex > 0) { currentIndex--; update(); } }
    function shuffle() { 
        wordList.sort(() => Math.random() - 0.5); 
        currentIndex = 0; 
        update(); 
    }

    update();
</script>
</body>
</html>
